<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Cliente | MULTITOOLS</title>
    <link rel="stylesheet" href="style.css?v=5">
</head>
<body>

<button id="btnImprimirTicket" class="btn-imprimir-flotante" style="display:none;">
    IMPRIMIR TICKET
</button>

<div class="contenedor" id="formularioContainer">
    <div class="logo">
        <img src="logo.png" alt="MULTITOOLS" id="logoImg">
    </div>

    <h1>Registro de Datos de Envío</h1>
    <p class="descripcion">Complete correctamente sus datos para realizar el despacho de su pedido.</p>

    <form id="formulario">
        <div class="campo">
            <label>Nombre Completo *</label>
            <input type="text" id="nombre" placeholder="Ejemplo: Juan Pérez Gómez" required>
        </div>

        <div class="campo">
            <label>DNI / CE *</label>
            <input type="text" id="dni" placeholder="Ingrese su DNI o CE" required>
        </div>

        <div class="campo">
            <label>Número Celular *</label>
            <input type="tel" id="celular" placeholder="987654321" required>
        </div>

        <div class="campo">
            <label>Dirección Agencia Shalom *</label>
            <textarea id="agencia" rows="3" placeholder="Ejemplo: Agencia Shalom Av. Nicolás Arriola 1500 La Victoria Lima" required></textarea>
        </div>

        <div class="campo">
            <label>PEDIDO *</label>
            <textarea id="pedido" rows="4" placeholder="Detalle del pedido (obligatorio)" required></textarea>
        </div>

        <button type="submit" class="btn-enviar">ENVIAR REGISTRO</button>
    </form>
</div>

<!-- ============ TICKET ============ -->
<div id="ticket" class="ticket oculto">
    
    <!-- HEADER: LOGO + DATOS -->
    <div class="ticket-header">
        <div class="ticket-datos-header">
            <p><span class="label">NOMBRE</span><br><span id="tNombre" class="valor"></span></p>
            <p><span class="label">DNI</span><br><span id="tDni" class="valor"></span></p>
            <p><span class="label">CELULAR</span><br><span id="tCelular" class="valor"></span></p>
            <p><span class="label">AGENCIA</span><br><span id="tAgencia" class="valor"></span></p>
        </div>
        <div class="ticket-logo-derecha">
            <img src="logo.png" alt="MULTITOOLS">
        </div>
    </div>

    <hr class="ticket-line">

    <!-- PEDIDO -->
    <div class="ticket-pedido">
        <div class="label">PEDIDO</div>
        <div id="tPedido" class="pedido-content" contenteditable="true"></div>
    </div>

    <hr class="ticket-line">

    <!-- REMITE -->
    <div class="ticket-remite">
        <p><span class="label">REMITE</span><br><span class="valor">Alexander Vásquez</span></p>
        <p><span class="valor">MULTITOOLS</span></p>
        <p><span class="valor">RUC: 20611590696</span></p>
        <p><span class="valor">Cel: 907008110</span></p>
    </div>

    <hr class="ticket-line">

    <!-- FECHA -->
    <div class="ticket-fecha" id="tFechaHora"></div>

    <button id="btnGuardarPedido" class="btn-guardar" style="display:none;">
        GUARDAR
    </button>
</div>

<script src="script.js?v=5"></script>
</body>
</html>
