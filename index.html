<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registro de Cliente | MULTITOOLS</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="contenedor">

    <div class="logo">
        <img src="logo.png" alt="MULTITOOLS">
    </div>

    <h1>REGISTRO DE DATOS DE ENVÍO</h1>

    <p class="descripcion">

        Complete correctamente los datos para realizar el despacho de su pedido.

    </p>

    <form id="formulario">

        <div class="campo">

            <label for="nombre">

                Nombre Completo *

            </label>

            <input
                id="nombre"
                type="text"
                placeholder="Ejemplo: Juan Pérez Gómez"
                autocomplete="name"
                required>

        </div>

        <div class="campo">

            <label for="dni">

                DNI / CE *

            </label>

            <input
                id="dni"
                type="text"
                placeholder="Ingrese su DNI o CE"
                autocomplete="off"
                required>

        </div>

        <div class="campo">

            <label for="celular">

                Número Celular *

            </label>

            <input
                id="celular"
                type="tel"
                placeholder="987654321"
                autocomplete="tel"
                required>

        </div>

        <div class="campo">

            <label for="agencia">

                Dirección Agencia Shalom *

            </label>

            <textarea
                id="agencia"
                rows="5"
                placeholder="Ejemplo:

Agencia Shalom

Av. Nicolás Arriola 1500

La Victoria

Lima"
                required></textarea>

        </div>

        <div class="campo">

            <label>

                PEDIDO

            </label>

            <textarea
                rows="5"
                disabled
                placeholder="Este campo será completado por el personal de MULTITOOLS al preparar el pedido."></textarea>

        </div>

        <button
            class="btn-enviar"
            type="submit">

            ENVIAR DATOS

        </button>

    </form>

</div>

<script src="script.js"></script>

</body>

</html>
