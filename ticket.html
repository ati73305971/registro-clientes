<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ticket de Envío | MULTITOOLS</title>

    <link rel="stylesheet" href="ticket.css">

</head>

<body>

<div class="ticket">

    <div class="barra">

        <h1>MULTITOOLS</h1>

        <button id="btnImprimir" title="Imprimir">

            🖨️

        </button>

    </div>

    <div class="remite">

        <h2>REMITENTE</h2>

        <p><strong>Alexander Vásquez</strong></p>

        <p>MULTITOOLS</p>

        <p>RUC: 2060XXXXXXXX</p>

        <p>Celular: 907008110</p>

    </div>

    <hr>

    <div class="destino">

        <h2>DESTINATARIO</h2>

        <div class="dato">

            <label>Nombre Completo</label>

            <div id="nombre"></div>

        </div>

        <div class="dato">

            <label>DNI / CE</label>

            <div id="dni"></div>

        </div>

        <div class="dato">

            <label>Celular</label>

            <div id="celular"></div>

        </div>

        <div class="dato">

            <label>Dirección Agencia Shalom</label>

            <div id="agencia"></div>

        </div>

    </div>

    <hr>

    <div class="pedido">

        <h2>PEDIDO</h2>

        <textarea

            id="pedido"

            placeholder="Escriba aquí el contenido del pedido...

Ejemplo:

• Taladro Total 650W

• Disco Corte 4''

• Caja de Brocas

• Llave Francesa 10''

Puede escribir sin límite."

        ></textarea>

    </div>

    <hr>

    <div class="footer">

        <p>

            Este ticket será adherido al paquete para su despacho.

        </p>

    </div>

</div>

<script src="ticket.js"></script>

</body>

</html>
